<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metronom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #ffffff;
      color: #111111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem;
      width: 100%;
      max-width: 620px;
    }

    #disp {
      font-size: 4rem;
      font-weight: 500;
      letter-spacing: -2px;
      line-height: 1;
    }

    #disp span {
      font-size: 1.2rem;
      font-weight: 400;
      color: #666;
    }

    #flash {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #111;
      opacity: 0.12;
      transition: opacity 0.05s;
    }

    .controls {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    input[type=range] {
      flex: 1;
      height: 6px;
      accent-color: #111;
      cursor: pointer;
    }

    input[type=number] {
      width: 88px;
      padding: 10px;
      font-size: 18px;
      font-weight: 500;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      color: #111;
      outline: none;
      -moz-appearance: textfield;
    }

    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number]:focus {
      border-color: #888;
    }

    button {
      padding: 10px 48px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      background: #111;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.8; }
    button:active { transform: scale(0.98); }

    .step-btn {
      width: 36px;
      height: 22px;
      font-size: 16px;
      padding: 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      background: #fff;
      color: #111;
      cursor: pointer;
      transition: background 0.1s;
      flex-shrink: 0;
      line-height: 1;
    }

    .step-btn:hover { background: #f0f0f0; }
    .step-btn:active { transform: scale(0.96); }

    .mode-toggle {
      display: flex;
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .mode-toggle button {
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 0;
      background: #fff;
      color: #888;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      opacity: 1;
    }

    .mode-toggle button.active {
      background: #111;
      color: #fff;
    }

    .mode-toggle button:hover:not(.active) { background: #f0f0f0; }

    .page {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .vol-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .vol-label {
      font-size: 12px;
      color: #666;
    }

    #vol-slider {
      writing-mode: vertical-lr;
      direction: rtl;
      width: 6px;
      height: 160px;
      accent-color: #111;
      cursor: pointer;
      flex: none;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0f0; }
      #disp span { color: #999; }
      #flash { background: #f0f0f0; }
      input[type=number] { background: #2a2a2a; color: #f0f0f0; border-color: #444; }
      input[type=range] { accent-color: #f0f0f0; }
      #vol-slider { accent-color: #f0f0f0; }
      button { background: #f0f0f0; color: #111; }
      .step-btn { background: #2a2a2a; color: #f0f0f0; border-color: #444; }
      .step-btn:hover { background: #3a3a3a; }
      .mode-toggle button { background: #2a2a2a; color: #888; border-color: #444; }
      .mode-toggle button.active { background: #f0f0f0; color: #111; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <div id="disp">120 <span>BPM</span></div>
      <div style="display:flex;align-items:center;gap:12px">
        <div id="flash"></div>
        <div id="disp-bps" style="font-size:1rem;font-weight:400;color:#aaa">2.00 BPS</div>
      </div>
      <div class="controls">
        <div class="mode-toggle">
          <button id="mode-bpm" class="active" onclick="setMode('bpm')">BPM</button>
          <button id="mode-bps" onclick="setMode('bps')">BPS</button>
        </div>
        <input type="range" id="sl" min="60" max="400" value="120" step="5">
        <input type="number" id="num" value="120" min="1">
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
          <button class="step-btn" onclick="stepVal(1)">+</button>
          <button class="step-btn" onclick="stepVal(-1)">−</button>
        </div>
      </div>
      <button id="btn" onclick="toggle()">Start</button>
    </div>
    <div class="vol-col">
      <span class="vol-label">100%</span>
      <input type="range" id="vol-slider" min="0" max="100" value="100" step="5">
      <span class="vol-label">Lautstärke</span>
    </div>
  </div>

  <script>
    let bpm = parseInt(localStorage.getItem('metronom_bpm')) || 120, running = false, tid = null, ctx = null;
    let volume = parseInt(localStorage.getItem('metronom_vol') ?? '100') / 100;
    let mode = localStorage.getItem('metronom_mode') || 'bpm';

    const volSlider = document.getElementById('vol-slider');
    const volLabel = volSlider.previousElementSibling;
    volSlider.value = Math.round(volume * 100);
    volLabel.textContent = Math.round(volume * 100) + '%';
    volSlider.addEventListener('input', e => {
      volume = e.target.value / 100;
      volLabel.textContent = e.target.value + '%';
      localStorage.setItem('metronom_vol', e.target.value);
    });

    function setMode(m) {
      mode = m;
      localStorage.setItem('metronom_mode', m);
      document.getElementById('mode-bpm').classList.toggle('active', m === 'bpm');
      document.getElementById('mode-bps').classList.toggle('active', m === 'bps');
      const sl = document.getElementById('sl');
      const num = document.getElementById('num');
      if (m === 'bpm') {
        sl.min = 60; sl.max = 400; sl.step = 5;
        sl.value = bpm;
        num.value = bpm;
        num.step = 1;
      } else {
        sl.min = 1; sl.max = 10; sl.step = 0.2;
        sl.value = parseFloat((bpm / 60).toFixed(2));
        num.value = (bpm / 60).toFixed(2);
        num.step = 0.1;
      }
    }

    function stepVal(d) {
      if (mode === 'bpm') {
        sync(bpm + d);
      } else {
        const cur = parseFloat(document.getElementById('num').value) || bpm / 60;
        syncFromBps(Math.round((cur + d * 0.1) * 100) / 100);
      }
    }

    function syncFromBps(bps) {
      bps = Math.max(0.1, bps);
      bpm = Math.max(1, Math.round(bps * 60));
      updateDisplay();
      document.getElementById('sl').value = bps;
      document.getElementById('num').value = bps.toFixed(2);
      localStorage.setItem('metronom_bpm', bpm);
      if (running) { clearInterval(tid); tid = setInterval(tick, 60000 / bpm); }
    }

    function sync(v) {
      bpm = Math.max(1, Math.round(v));
      updateDisplay();
      document.getElementById('sl').value = Math.min(bpm, 400);
      document.getElementById('num').value = bpm;
      localStorage.setItem('metronom_bpm', bpm);
      if (running) { clearInterval(tid); tid = setInterval(tick, 60000 / bpm); }
    }

    function updateDisplay() {
      document.getElementById('disp').innerHTML = bpm + ' <span>BPM</span>';
      document.getElementById('disp-bps').textContent = (bpm / 60).toFixed(2) + ' BPS';
    }

    document.getElementById('sl').addEventListener('input', e => {
      if (mode === 'bpm') sync(e.target.value);
      else syncFromBps(parseFloat(e.target.value));
    });
    document.getElementById('num').addEventListener('input', e => {
      if (mode === 'bpm' && e.target.value > 0) sync(e.target.value);
    });
    document.getElementById('num').addEventListener('change', e => {
      if (mode === 'bps' && e.target.value > 0) syncFromBps(parseFloat(e.target.value));
    });

    function click() {
      try {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 1000;
        g.gain.setValueAtTime(0.3 * volume, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
        o.start(); o.stop(ctx.currentTime + 0.07);
      } catch(e) {}
    }

    function tick() {
      click();
      const f = document.getElementById('flash');
      f.style.opacity = '1';
      setTimeout(() => f.style.opacity = '0.12', 80);
    }

    setMode(mode);
    sync(bpm);

    function toggle() {
      if (running) {
        clearInterval(tid); tid = null; running = false;
        document.getElementById('btn').textContent = 'Start';
      } else {
        tick();
        tid = setInterval(tick, 60000 / bpm);
        running = true;
        document.getElementById('btn').textContent = 'Stop';
      }
    }
  </script>
</body>
</html>
